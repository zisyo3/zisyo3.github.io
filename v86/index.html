<!DOCTYPE html>
<html lang="ja">
<head>
  <title>v86</title>
  <meta charset="utf-8"></meta>

  <link rel="stylesheet" href="v86.css">

  <style>
        #screen_container {
            width: 640px;
            height: 400px;
            background-color: black;
        }
  </style>
</head>
<body>
  <div id="screen_container" ></div>
  <p id="state">Power:off</p>
  <script type="module">
    import { V86 } from "./libv86.js";

    window.onerror = function(message, source, lineno, colno, error) {
      alert("error:\n" + message + "\nline: " + lineno);
      return false;
    };

    window.onload = function() {
      var emulator;
      try {
        // 3. v86の起動設定
        emulator = new V86({
            wasm_path: "v86.wasm",
            screen_container: document.getElementById("screen_container"),
            memory_size: 32 * 1024 * 1024,
            cdrom: { url: "images/linux.iso" }, 
            bios: { url: "bios/seabios.bin" }, 
            vga_bios: { url: "bios/vgabios.bin" },
            autostart: true,
        });
      } catch (error) {
        alert(
          error.name +"\n" +
          error.message +"\n" +
          error.stack +"\n"
        );
      }
      var stateDisplay = document.getElementById("state");
      function mainLoop(){
        if(emulator.is_running() == true){
          stateDisplay.textContent = "Power:ON";
        }else{
          stateDisplay.textContent = "Power:OFF";
        }
        requestAnimationFrame(mainLoop);
      }
      mainLoop();
    };
  </script>  
</body>
</html>
