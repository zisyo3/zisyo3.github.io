<!DOCTYPE html>
<html lang="ja">
<head>
  <title>v86</title>
  <meta charset="utf-8"></meta>
</head>
<body>
  <div id="screen_container" ></div>
  <script type="module">
    import { V86 } from "./libv86.js";
    window.onload = function() {
      try {
        // 3. v86の起動設定
        var emulator = new V86({
            wasm_path: "v86.wasm",
            screen_container: document.getElementById("screen_container"),
            memory_size: 32 * 1024 * 1024,
            cdrom: { url: "images/linux.iso" }, 
            bios: { url: "bios/seabios.bin" }, 
            vga_bios: { url: "bios/vgabios.bin" },
            autostart: true,
        });
      } catch (error) {
        alert(
          error.name +"\n" +
          error.message +"\n" +
          error.stack +"\n"
        );
      }
    };
  </script>  
</body>
</html>
